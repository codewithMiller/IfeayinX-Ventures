<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Shop{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #C9A84C; --black: #0A0A0A; --cream: #FAF7F0; }
    body { font-family: 'DM Sans', sans-serif; background: #0A0A0A; color: #FAF7F0; }
    h1,h2,h3,.brand { font-family: 'Playfair Display', serif; }

    /* 3D Carousel */
    .carousel-scene { perspective: 1200px; height: 500px; }
    .carousel-track {
      width: 300px; height: 450px; position: relative;
      transform-style: preserve-3d;
      animation: rotate3d 24s linear infinite;
    }
    .carousel-track .card-3d {
      position: absolute; width: 300px; height: 450px;
      backface-visibility: hidden; border-radius: 12px; overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .carousel-track .card-3d:nth-child(1) { transform: rotateY(0deg) translateZ(400px); }
    .carousel-track .card-3d:nth-child(2) { transform: rotateY(60deg) translateZ(400px); }
    .carousel-track .card-3d:nth-child(3) { transform: rotateY(120deg) translateZ(400px); }
    .carousel-track .card-3d:nth-child(4) { transform: rotateY(180deg) translateZ(400px); }
    .carousel-track .card-3d:nth-child(5) { transform: rotateY(240deg) translateZ(400px); }
    .carousel-track .card-3d:nth-child(6) { transform: rotateY(300deg) translateZ(400px); }
    @keyframes rotate3d { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

    /* Nav overlay */
    .nav-overlay { transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); }
    .nav-overlay.open { transform: translateX(0); }

    /* Fade in */
    .fade-up { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.4,0,0.2,1); }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* Gold shimmer button */
    .btn-gold { background: linear-gradient(135deg, #C9A84C, #E8D48B, #C9A84C); background-size: 200% 200%; transition: all 0.3s; }
    .btn-gold:hover { background-position: 100% 0; transform: scale(1.02); box-shadow: 0 8px 30px rgba(201,168,76,0.4); }

    .product-card { transition: transform 0.4s, box-shadow 0.4s; }
    .product-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

    @media (max-width: 768px) {
      .carousel-scene { height: 350px; }
      .carousel-track { width: 200px; height: 300px; }
      .carousel-track .card-3d { width: 200px; height: 300px; }
      .carousel-track .card-3d:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
      .carousel-track .card-3d:nth-child(2) { transform: rotateY(60deg) translateZ(250px); }
      .carousel-track .card-3d:nth-child(3) { transform: rotateY(120deg) translateZ(250px); }
      .carousel-track .card-3d:nth-child(4) { transform: rotateY(180deg) translateZ(250px); }
      .carousel-track .card-3d:nth-child(5) { transform: rotateY(240deg) translateZ(250px); }
      .carousel-track .card-3d:nth-child(6) { transform: rotateY(300deg) translateZ(250px); }
    }
  </style>
  
<!-- Navigation -->
<header class="fixed top-0 left-0 right-0 z-50 backdrop-blur-md bg-[#0A0A0A]/90 border-b border-[#C9A84C]/20">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <h1 class="brand text-2xl md:text-3xl font-bold tracking-wider text-[#FAF7F0]">
      {{ site_settings.business_name|default:"IfeayinX" }}
    </h1>
    <button id="menu-toggle" class="w-10 h-10 flex flex-col justify-center items-center gap-1.5 group" aria-label="Open menu">
      <span class="w-7 h-0.5 bg-[#C9A84C] transition-all group-hover:w-5"></span>
      <span class="w-5 h-0.5 bg-[#C9A84C] transition-all group-hover:w-7"></span>
      <span class="w-6 h-0.5 bg-[#C9A84C] transition-all group-hover:w-4"></span>
    </button>
  </div>
</header>

<!-- Nav Overlay -->
<nav id="nav-overlay" class="nav-overlay fixed inset-0 z-[60] bg-[#0A0A0A] flex flex-col items-center justify-center gap-8" aria-label="Main navigation">
  <button id="menu-close" class="absolute top-6 right-6 text-[#C9A84C]" aria-label="Close menu">
    <i data-lucide="x" style="width:32px;height:32px"></i>
  </button>
  <a href="{% url 'shop' %}" class="text-3xl md:text-5xl font-bold text-[#FAF7F0] hover:text-[#C9A84C] transition-colors">Shop</a>
  <!-- TODO: wire up when Collections page exists -->
  <a href="#" class="text-3xl md:text-5xl font-bold text-[#FAF7F0] hover:text-[#C9A84C] transition-colors">Collections</a>
  <!-- TODO: wire up when About page exists -->
  <a href="#" class="text-3xl md:text-5xl font-bold text-[#FAF7F0] hover:text-[#C9A84C] transition-colors">About</a>
  <!-- TODO: wire up when Contact page exists -->
  <a href="#" class="text-3xl md:text-5xl font-bold text-[#FAF7F0] hover:text-[#C9A84C] transition-colors">Contact</a>
</nav>
  {% block extra_css %}{% endblock %}
</head>
<body class="w-full min-h-screen overflow-x-hidden">

  {% block content %}{% endblock %}

  {% block extra_js %}
  <script>
  function toggleFilters() {
    const panel = document.getElementById("filterPanel");
    panel.classList.toggle("hidden");
  }
      // Menu toggle
  const overlay = document.getElementById('nav-overlay');
  document.getElementById('menu-toggle').addEventListener('click', () => overlay.classList.add('open'));
  document.getElementById('menu-close').addEventListener('click', () => overlay.classList.remove('open'));
</script>

<script>
  lucide.createIcons();
</script>
  {% endblock %}
</body>
</html>
